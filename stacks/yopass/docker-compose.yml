version: "3.8"

services:
  memcached:
    image: memcached:alpine
    container_name: yopass-memcached
    restart: unless-stopped
    # -I cannot exceed half of -m; default 64MB RAM caps -I at 32m without -m
    command: ["-m", "128", "-I", "50m"]
    expose:
      - "11211"
    networks:
      - homelab

  yopass:
    image: jhaals/yopass:latest
    container_name: yopass
    restart: unless-stopped
    ports:
      - "4040:1337"
    environment:
      MEMCACHED: ${YOPASS_MEMCACHED}
    command: ["--memcached=${YOPASS_MEMCACHED}", "--port=1337"]
    depends_on:
      - memcached
    networks:
      - homelab
    healthcheck:
      test: ["CMD", "/yopass-server", "--health-check"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  homelab:
    external: true
