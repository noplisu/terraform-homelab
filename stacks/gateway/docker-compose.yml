version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: gateway-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      # Single-file mount — stale files in conf.d/ on the NAS are never loaded
      - /volume1/docker/gateway/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
