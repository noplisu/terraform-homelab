version: "3"

services:
  gitea:
    image: gitea/gitea:1.24
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=${GITEA_ROOT_URL}
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__HTTP_PORT=3000
    restart: always
    volumes:
      - /volume1/docker/gitea/data:/data
    ports:
      - 3123:3000
      - 2345:2222
    networks:
      - homelab

networks:
  homelab:
    external: true
